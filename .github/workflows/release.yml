name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            binary: codeclaw
            release_name: codeclaw-darwin-arm64
          - os: macos-15
            arch: x86_64
            binary: codeclaw
            release_name: codeclaw-darwin-x86_64
          - os: ubuntu-latest
            arch: x86_64
            binary: codeclaw
            release_name: codeclaw-linux-x86_64
          - os: windows-latest
            arch: x86_64
            binary: codeclaw.exe
            release_name: codeclaw-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name codeclaw --clean --noconfirm codeclaw.py

      - name: Rename for release
        run: mv dist/${{ matrix.binary }} dist/${{ matrix.release_name }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: dist/${{ matrix.release_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
